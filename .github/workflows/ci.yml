name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: duq
          POSTGRES_PASSWORD: duq
          POSTGRES_DB: duq_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Download dependencies
        run: go mod download

      - name: Run go vet
        run: go vet ./...

      - name: Run tests with coverage
        env:
          DUQ_DB_HOST: localhost
          DUQ_DB_PORT: 5432
          DUQ_DB_USER: duq
          DUQ_DB_PASSWORD: duq
          DUQ_DB_NAME: duq_test
          REDIS_URL: redis://localhost:6379
        run: |
          go test ./... -v -race -coverprofile=coverage.out -covermode=atomic

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out
          fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build binary
        run: |
          GOOS=linux GOARCH=amd64 go build -o duq-gateway-linux .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: duq-gateway-linux
          path: duq-gateway-linux
